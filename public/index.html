<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Postarr · Jellyfin Display</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #090910;
    --surface: #111118;
    --surf2:   #18181f;
    --border:  rgba(255,255,255,0.07);
    --accent:  #c8a97e;
    --adim:    rgba(200,169,126,0.15);
    --text:    #e8e4dc;
    --muted:   #6b6878;
    --muted2:  #2e2c37;
    --red:     #e05a5a;
    --green:   #5ae07a;
    --blue:    #a0a0f0;
  }

  /* ── Reset: force true full-viewport ── */
  html { height: 100%; }
  body {
    height: 100%; width: 100%;
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
  }

  /* ── Screen container ── */
  #app {
    position: fixed;
    inset: 0;          /* top:0 right:0 bottom:0 left:0 — guarantees 100vw × 100vh */
    overflow: hidden;
  }

  /* Each screen absolutely fills #app */
  .screen {
    position: absolute;
    inset: 0;
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }
  .screen.active {
    opacity: 1;
    visibility: visible;
    pointer-events: all;
  }

  /* Transition overlays */
  #fadeOv { position: fixed; inset: 0; background: var(--bg); opacity: 0; z-index: 200; pointer-events: none; }
  #wipeOv { position: fixed; inset: 0; background: var(--accent); transform: translateX(-101%); z-index: 200; pointer-events: none; }

  /* ambient */
  .amb { position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 80%, rgba(200,169,126,0.04) 0%, transparent 70%),
      radial-gradient(ellipse 40% 30% at 80% 20%, rgba(124,106,175,0.03) 0%, transparent 70%); }

  /* ════════════════════════════════════════
     SCREEN 1 – NOW PLAYING  (v3 split)
  ════════════════════════════════════════ */
  #s-np {
    display: grid;
    /* Left panel: fluid 22vw, capped 260–360px. Right: fills rest. */
    grid-template-columns: clamp(240px, 22vw, 340px) 1fr;
    background: var(--bg);
  }

  /* ── left panel ── */
  .np-left {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    height: 100%;
  }

  .np-poster-region { position: relative; flex-shrink: 0; }
  .np-poster-region img {
    width: 100%;
    height: clamp(160px, 28vh, 320px);
    object-fit: cover;
    object-position: top;
    display: block;
  }
  .np-poster-region::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0;
    height: clamp(40px, 8vh, 80px);
    background: linear-gradient(transparent, var(--surface));
    pointer-events: none;
  }

  .np-live {
    position: absolute; top: clamp(6px,1vh,12px); left: clamp(6px,1vw,12px); z-index: 2;
    display: flex; align-items: center; gap: 5px;
    background: rgba(0,0,0,0.65); backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 100px;
    padding: 3px 9px 3px 7px;
    font-size: clamp(7px,0.65vw,9px); font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--accent);
  }
  .live-dot { width: 5px; height: 5px; background: var(--red); border-radius: 50%; flex-shrink: 0; animation: pulse 1.8s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.3;transform:scale(.65)} }

  .np-qb {
    position: absolute; top: clamp(6px,1vh,12px); right: clamp(6px,1vw,12px); z-index: 2;
    background: rgba(0,0,0,0.65); backdrop-filter: blur(8px);
    border: 1px solid rgba(200,169,126,0.3); border-radius: 4px;
    padding: 2px 7px;
    font-size: clamp(7px,0.65vw,9px); font-weight: 600; letter-spacing: .08em; color: var(--accent);
  }

  .np-scroll {
    padding: clamp(8px,1.2vh,16px) clamp(10px,1.2vw,18px);
    flex: 1; overflow-y: auto; scrollbar-width: none;
    display: flex; flex-direction: column;
    gap: clamp(6px,0.9vh,11px);
  }
  .np-scroll::-webkit-scrollbar { display: none; }

  .np-title { font-family: 'DM Serif Display', serif; font-size: clamp(1rem,1.8vw,1.55rem); line-height: 1.15; }
  .np-meta  { font-size: clamp(7px,0.65vw,10px); color: var(--muted); }

  .np-ratings { display: flex; gap: clamp(3px,0.4vw,6px); flex-wrap: wrap; }
  .rpill { display: flex; align-items: center; gap: 4px; background: var(--surf2); border: 1px solid var(--border); border-radius: 5px; padding: 3px 7px; font-size: clamp(7px,0.65vw,9px); font-weight: 600; }
  .rpill .rl { font-size: clamp(6px,0.58vw,8px); color: var(--muted); letter-spacing: .06em; text-transform: uppercase; }

  .prog-wrap { display: flex; flex-direction: column; gap: 5px; }
  .prog-track { height: 2px; background: var(--muted2); border-radius: 2px; overflow: hidden; }
  .prog-fill  { height: 100%; background: linear-gradient(90deg, var(--accent), #e8c99a); border-radius: 2px; transition: width 1s linear; }
  .prog-times { display: flex; justify-content: space-between; font-size: clamp(7px,0.65vw,9px); color: var(--muted); font-variant-numeric: tabular-nums; }

  .watcher {
    display: flex; align-items: center; gap: 7px;
    padding: clamp(5px,0.7vh,9px) clamp(6px,0.7vw,10px);
    background: var(--surf2); border: 1px solid var(--border); border-radius: clamp(4px,0.5vw,7px);
    font-size: clamp(7px,0.65vw,10px); color: var(--muted);
  }
  .avatar {
    width: clamp(18px,1.9vh,26px); height: clamp(18px,1.9vh,26px); border-radius: 50%;
    background: linear-gradient(135deg,#7c6aaf,#c8a97e);
    display: flex; align-items: center; justify-content: center;
    font-size: clamp(8px,0.75vw,10px); font-weight: 700; color: white; flex-shrink: 0;
  }

  .file-grid { display: grid; grid-template-columns: 1fr 1fr; gap: clamp(3px,0.4vw,6px); }
  .fchip { background: var(--surf2); border: 1px solid var(--border); border-radius: 4px; padding: clamp(3px,0.5vh,6px) clamp(5px,0.5vw,8px); }
  .fchip .fl { font-size: clamp(6px,0.58vw,8px); color: var(--muted); letter-spacing: .07em; text-transform: uppercase; display: block; margin-bottom: 1px; }
  .fchip .fv { font-size: clamp(7px,0.65vw,9px); font-weight: 600; }

  .np-overview { font-size: clamp(7px,0.65vw,10px); color: var(--muted); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

  .slabel { font-size: clamp(6px,0.58vw,8px); font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--muted2); }
  .cast-row { display: flex; gap: clamp(4px,0.5vw,8px); overflow-x: auto; scrollbar-width: none; }
  .cast-row::-webkit-scrollbar { display: none; }
  .cast-card { flex-shrink: 0; text-align: center; width: clamp(34px,3.2vw,48px); }
  .cast-card img { width: clamp(30px,2.8vw,42px); height: clamp(30px,2.8vw,42px); border-radius: 50%; object-fit: cover; display: block; margin: 0 auto 3px; border: 1.5px solid var(--border); background: var(--surf2); }
  .cast-card .cn { font-size: clamp(6px,0.58vw,8px); color: var(--muted); line-height: 1.3; }

  /* ── right panel ── */
  .np-right {
    display: flex; flex-direction: column;
    padding: clamp(8px,1.2vh,16px) clamp(10px,1.2vw,18px);
    gap: clamp(7px,1vh,13px);
    overflow: hidden;
    height: 100%;
  }
  .rh { display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .rh h2 { font-family: 'DM Serif Display', serif; font-size: clamp(0.8rem,1.2vw,1.1rem); font-weight: 400; }
  .rh .rsub { font-size: clamp(7px,0.65vw,9px); color: var(--muted); }
  .tabs { display: flex; gap: 3px; }
  .tab { font-size: clamp(7px,0.65vw,9px); font-weight: 500; padding: 3px 8px; border-radius: 4px; border: none; background: transparent; color: var(--muted); cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all .15s; }
  .tab.active { background: var(--adim); color: var(--accent); }

  .ugrid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(clamp(68px,7vw,110px), 1fr));
    gap: clamp(6px,0.8vw,12px);
    overflow-y: auto; scrollbar-width: none;
    align-content: start; flex: 1;
  }
  .ugrid::-webkit-scrollbar { display: none; }
  .mc { transition: transform .18s; }
  .mc:hover { transform: translateY(-3px); }
  .mc:hover .cp { border-color: rgba(200,169,126,.4); }
  .cpw { position: relative; margin-bottom: clamp(3px,0.4vh,5px); }
  .cp { width: 100%; aspect-ratio: 2/3; object-fit: cover; border-radius: clamp(4px,0.4vw,7px); display: block; border: 1px solid var(--border); transition: border-color .18s; background: var(--surf2); }
  .cs { position: absolute; bottom: 4px; left: 4px; font-size: clamp(6px,0.58vw,8px); font-weight: 600; letter-spacing: .06em; text-transform: uppercase; padding: 1px 4px; border-radius: 3px; }
  .s-av { background: rgba(90,224,122,.15); color: var(--green); border: 1px solid rgba(90,224,122,.3); }
  .s-dl { background: rgba(200,169,126,.15); color: var(--accent); border: 1px solid rgba(200,169,126,.3); }
  .s-rq { background: rgba(100,100,200,.15); color: var(--blue); border: 1px solid rgba(100,100,200,.3); }
  .cr { position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,.7); backdrop-filter: blur(4px); border-radius: 3px; padding: 1px 4px; font-size: clamp(6px,0.58vw,8px); font-weight: 700; color: #f5c518; }
  .ct { font-size: clamp(8px,0.75vw,11px); font-weight: 500; line-height: 1.3; margin-bottom: 1px; }
  .cm { font-size: clamp(7px,0.65vw,9px); color: var(--muted); }

  /* ════════════════════════════════════════
     SCREEN 2 – UPCOMING  (full poster grid)
  ════════════════════════════════════════ */
  #s-up {
    background: var(--bg);
    display: flex; flex-direction: column;
    padding: clamp(24px,3.5vh,48px) clamp(24px,3.5vw,52px) clamp(18px,2.5vh,36px);
    gap: clamp(14px,2vh,26px);
    overflow: hidden;
  }
  .up-hdr h1 { font-family: 'DM Serif Display', serif; font-size: clamp(1.4rem,2.8vw,2.4rem); font-weight: 400; margin-bottom: 4px; }
  .up-hdr .sub { font-size: clamp(9px,0.85vw,12px); color: var(--muted); }
  .big-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: clamp(10px,1.4vw,18px);
    flex: 1; overflow: hidden; align-content: start;
  }
  .big-card { transition: transform .2s; }
  .big-card:hover { transform: translateY(-4px) scale(1.02); }
  .big-card:hover .bp { border-color: rgba(200,169,126,.5); box-shadow: 0 8px 32px rgba(0,0,0,.5); }
  .bpw { position: relative; margin-bottom: clamp(5px,0.7vh,9px); }
  .bp { width: 100%; aspect-ratio: 2/3; object-fit: cover; border-radius: clamp(5px,0.5vw,9px); display: block; border: 1px solid var(--border); transition: all .2s; background: var(--surf2); }
  .bb { position: absolute; bottom: 6px; left: 6px; font-size: clamp(6px,0.58vw,8px); font-weight: 600; letter-spacing: .06em; text-transform: uppercase; padding: 2px 5px; border-radius: 3px; }
  .br { position: absolute; top: 6px; right: 6px; background: rgba(0,0,0,.72); backdrop-filter: blur(4px); border-radius: 3px; padding: 2px 5px; font-size: clamp(6px,0.58vw,8px); font-weight: 700; color: #f5c518; }
  .bt { font-size: clamp(9px,0.85vw,12px); font-weight: 500; margin-bottom: 2px; line-height: 1.3; }
  .bm { font-size: clamp(7px,0.65vw,9px); color: var(--muted); }

  /* ════════════════════════════════════════
     SCREEN 3 – SPOTLIGHT  (cinematic hero)
  ════════════════════════════════════════ */
  #s-sp { position: relative; overflow: hidden; background: var(--bg); }

  .sp-bg {
    position: absolute; inset: -8%;
    background-size: cover; background-position: center;
    filter: blur(30px) brightness(0.22) saturate(1.4);
    transform: scale(1.1); z-index: 0;
  }
  .sp-grad {
    position: absolute; inset: 0; z-index: 1;
    background:
      linear-gradient(90deg, rgba(9,9,16,0.97) 32%, rgba(9,9,16,0.6) 62%, rgba(9,9,16,0.18) 100%),
      linear-gradient(0deg, rgba(9,9,16,0.55) 0%, transparent 40%);
  }
  .sp-body {
    position: relative; z-index: 2;
    display: flex; align-items: center;
    height: 100%;
    padding: 0 clamp(32px,6vw,80px);
    gap: clamp(28px,5vw,64px);
  }
  .sp-poster {
    width: clamp(120px,14vw,240px); flex-shrink: 0;
    aspect-ratio: 2/3; object-fit: cover;
    border-radius: clamp(8px,0.8vw,14px);
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 24px 80px rgba(0,0,0,0.75);
    background: var(--surf2);
  }
  .sp-info { max-width: clamp(280px,42vw,520px); }
  .sp-eye {
    font-size: clamp(8px,0.75vw,10px); font-weight: 600; letter-spacing: .15em; text-transform: uppercase;
    color: var(--accent); margin-bottom: clamp(8px,1.2vh,16px);
    display: flex; align-items: center; gap: 8px;
  }
  .sp-eye::before { content: ''; display: block; width: 24px; height: 1px; background: var(--accent); }
  .sp-title { font-family: 'DM Serif Display', serif; font-size: clamp(1.8rem,3.8vw,3.6rem); line-height: 1.05; margin-bottom: clamp(4px,0.7vh,10px); }
  .sp-meta  { font-size: clamp(9px,0.85vw,12px); color: var(--muted); margin-bottom: clamp(10px,1.5vh,18px); }
  .sp-status {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(200,169,126,0.1); border: 1px solid rgba(200,169,126,0.28); border-radius: 6px;
    padding: clamp(4px,0.6vh,7px) clamp(10px,1vw,14px);
    font-size: clamp(9px,0.85vw,11px); font-weight: 600; color: var(--accent);
    margin-bottom: clamp(10px,1.5vh,18px);
  }
  .sp-rats { display: flex; gap: clamp(6px,0.7vw,10px); margin-bottom: clamp(10px,1.5vh,18px); flex-wrap: wrap; }
  .sp-rpill { display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 7px; padding: clamp(5px,0.6vh,8px) clamp(9px,0.9vw,13px); font-size: clamp(10px,1vw,13px); font-weight: 600; }
  .sp-rpill .srl { font-size: clamp(7px,0.65vw,9px); color: var(--muted); letter-spacing: .06em; text-transform: uppercase; }
  .sp-ov { font-size: clamp(9px,0.9vw,13px); color: var(--muted); line-height: 1.75; margin-bottom: clamp(10px,1.5vh,20px); display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
  .sp-cast { display: flex; gap: clamp(6px,0.7vw,10px); align-items: center; flex-wrap: wrap; }
  .sp-cast-label { font-size: clamp(7px,0.65vw,9px); font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--muted2); margin-right: 4px; }
  .sp-cast img { width: clamp(26px,2.6vw,38px); height: clamp(26px,2.6vw,38px); border-radius: 50%; object-fit: cover; border: 2px solid rgba(255,255,255,0.12); background: var(--surf2); }

  /* ════════════════════════════════════════
     SCREEN 4 – IDLE
  ════════════════════════════════════════ */
  #s-idle {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 8px; background: var(--bg);
  }
  .idle-clock { font-family: 'DM Serif Display', serif; font-size: clamp(4rem,11vw,8rem); line-height: 1; color: rgba(232,228,220,0.07); letter-spacing: -0.04em; margin-bottom: 8px; }
  .idle-label { font-size: clamp(8px,0.75vw,11px); color: var(--muted2); letter-spacing: .15em; text-transform: uppercase; }
  .idle-posters { display: flex; gap: clamp(7px,0.9vw,13px); margin-top: clamp(16px,2.5vh,28px); }
  .idle-posters img { width: clamp(44px,4.5vw,70px); aspect-ratio: 2/3; object-fit: cover; border-radius: 6px; opacity: 0.14; border: 1px solid var(--border); background: var(--surf2); }

  /* ════════════════════════════════════════
     PAGE DOTS
  ════════════════════════════════════════ */
  #pdots {
    position: fixed; bottom: clamp(10px,1.8vh,18px); left: 50%; transform: translateX(-50%);
    display: flex; gap: 6px; align-items: center; z-index: 300; pointer-events: none;
  }
  .pdot { width: 5px; height: 5px; border-radius: 50%; background: var(--muted2); transition: all .3s; }
  .pdot.active { background: var(--accent); width: 14px; border-radius: 3px; }
</style>
</head>
<body>
<div class="amb"></div>
<div id="pdots"></div>
<div id="app">
  <div id="fadeOv"></div>
  <div id="wipeOv"></div>

  <!-- ════ SCREEN 1: NOW PLAYING ════ -->
  <div class="screen active" id="s-np">
    <div class="np-left">
      <div class="np-poster-region">
        <div class="np-live"><span class="live-dot"></span>Now Playing</div>
        <div class="np-qb" id="npQb" style="display:none"></div>
        <img id="npPoster" src="" alt="">
      </div>
      <div class="np-scroll">
        <div>
          <div class="np-title" id="npTitle">—</div>
          <div class="np-meta"  id="npMeta"></div>
        </div>
        <div class="np-ratings" id="npRats"></div>
        <div class="prog-wrap">
          <div class="prog-track"><div class="prog-fill" id="npProg" style="width:0%"></div></div>
          <div class="prog-times"><span id="npElapsed">0:00:00</span><span id="npDur">0:00:00</span></div>
        </div>
        <div class="watcher">
          <div class="avatar" id="npAv">?</div>
          <div style="flex:1;min-width:0;overflow:hidden">
            <div style="color:var(--text);font-weight:600;font-size:clamp(8px,0.75vw,10px);white-space:nowrap;overflow:hidden;text-overflow:ellipsis" id="npUser">—</div>
            <div style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis" id="npDev">—</div>
          </div>
        </div>
        <div class="file-grid" id="npFile" style="display:none"></div>
        <div class="np-overview" id="npOv"></div>
        <div id="npCastWrap" style="display:none">
          <div class="slabel" style="margin-bottom:clamp(4px,0.5vh,7px)">Top Cast</div>
          <div class="cast-row" id="npCast"></div>
        </div>
      </div>
    </div>

    <div class="np-right">
      <div class="rh">
        <div>
          <h2>Up Next</h2>
          <div class="rsub" id="npSub">Your library</div>
        </div>
        <div class="tabs">
          <button class="tab active" data-tab="all">All</button>
          <button class="tab" data-tab="movies">Movies</button>
          <button class="tab" data-tab="tv">TV</button>
        </div>
      </div>
      <div class="ugrid" id="npGrid"></div>
    </div>
  </div>

  <!-- ════ SCREEN 2: UPCOMING ════ -->
  <div class="screen" id="s-up">
    <div class="up-hdr">
      <h1>Coming Up</h1>
      <div class="sub" id="upSub">Your library</div>
    </div>
    <div class="big-grid" id="upGrid"></div>
  </div>

  <!-- ════ SCREEN 3: SPOTLIGHT ════ -->
  <div class="screen" id="s-sp">
    <div class="sp-bg" id="spBg"></div>
    <div class="sp-grad"></div>
    <div class="sp-body">
      <img class="sp-poster" id="spPoster" src="" alt="">
      <div class="sp-info">
        <div class="sp-eye" id="spEye">From Your Library</div>
        <div class="sp-title"  id="spTitle">—</div>
        <div class="sp-meta"   id="spMeta"></div>
        <div class="sp-status" id="spStatus" style="display:none"></div>
        <div class="sp-rats"   id="spRats"></div>
        <div class="sp-ov"     id="spOv"></div>
        <div class="sp-cast"   id="spCast" style="display:none"></div>
      </div>
    </div>
  </div>

  <!-- ════ SCREEN 4: IDLE ════ -->
  <div class="screen" id="s-idle">
    <div class="idle-clock" id="clock">--:--</div>
    <div class="idle-label">Nothing playing</div>
    <div class="idle-posters" id="idlePosts"></div>
  </div>

</div>

<script>
// ─── constants ───────────────────────────────────────────────────
const IDS    = ['s-np','s-up','s-sp','s-idle'];
const ELS    = IDS.map(id => document.getElementById(id));
const fadeOv = document.getElementById('fadeOv');
const wipeOv = document.getElementById('wipeOv');
const CLS    = { downloading:'s-dl', available:'s-av', requested:'s-rq' };

// ─── state ───────────────────────────────────────────────────────
let cur=3, locked=false, sTmr=null, pTmr=null, progTmr=null, xing=false, state=null;
let anim='fade', scrDur=15000, pollMs=5000, lPos=0, lDur=0, tab='all';

// ─── logging ─────────────────────────────────────────────────────
const LOG = {
  info:  (...a) => console.info( `%c[Postarr INFO ]`, 'color:#c8a97e', ...a),
  warn:  (...a) => console.warn( `%c[Postarr WARN ]`, 'color:#f97316', ...a),
  error: (...a) => console.error(`%c[Postarr ERROR]`, 'color:#e05a5a', ...a),
  debug: (...a) => console.debug(`%c[Postarr DEBUG]`, 'color:#6b6878', ...a),
};

// ─── clock ───────────────────────────────────────────────────────
function tick() {
  const n = new Date();
  document.getElementById('clock').textContent =
    String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
}
tick(); setInterval(tick, 15000);

function fms(ms) {
  if (!ms || ms <= 0) return '0:00:00';
  const s = Math.floor(ms/1000), h = Math.floor(s/3600),
        m = Math.floor((s%3600)/60), sc = s%60;
  return `${h}:${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}`;
}

// ─── transitions ─────────────────────────────────────────────────
function show(i) {
  ELS.forEach((e,j) => e.classList.toggle('active', j===i));
  cur = i;
  dots();
}

function goTo(i, imm=false) {
  if (i === cur) return;
  if (imm || xing) { show(i); return; }
  xing = true;
  if      (anim==='slide') doSlide(cur, i);
  else if (anim==='wipe')  doWipe(cur, i);
  else                     doFade(cur, i);
}

function doFade(f, t) {
  fadeOv.style.cssText = 'transition:none;opacity:0'; fadeOv.offsetHeight;
  fadeOv.style.cssText = 'transition:opacity 0.38s ease;opacity:1';
  setTimeout(() => {
    show(t);
    fadeOv.style.cssText = 'transition:opacity 0.42s ease;opacity:0';
    setTimeout(() => { xing = false; }, 430);
  }, 390);
}

function doSlide(f, t) {
  const d = t > f ? 1 : -1, inc = ELS[t], out = ELS[f];
  inc.style.cssText = `transform:translateX(${d*100}%);opacity:1;visibility:visible;transition:none`;
  inc.offsetHeight;
  inc.style.transition = out.style.transition = 'transform 0.52s cubic-bezier(0.4,0,0.2,1)';
  inc.style.transform = 'translateX(0)';
  out.style.transform = `translateX(${-d*100}%)`;
  setTimeout(() => { [inc,out].forEach(e => { e.style.cssText=''; }); show(t); xing = false; }, 540);
}

function doWipe(f, t) {
  wipeOv.style.cssText = 'transition:none;transform:translateX(-101%)'; wipeOv.offsetHeight;
  wipeOv.style.transition = 'transform 0.36s cubic-bezier(0.4,0,0.2,1)';
  wipeOv.style.transform = 'translateX(0)';
  setTimeout(() => {
    show(t);
    wipeOv.style.transform = 'translateX(101%)';
    setTimeout(() => { wipeOv.style.cssText = 'transform:translateX(-101%)'; xing = false; }, 370);
  }, 370);
}

// ─── rotation ────────────────────────────────────────────────────
function getRotation(s) {
  if (s.nowPlaying) return [0];
  const l = [];
  if (s.downloading?.length || s.requested?.length || s.available?.length) l.push(1);
  if (s.spotlight) l.push(2);
  return l.length ? l : [3];
}

function startRot() {
  clearTimeout(sTmr);
  if (locked) return;
  sTmr = setTimeout(() => {
    if (locked || !state) return;
    const r    = getRotation(state);
    const next = r[(r.indexOf(cur) + 1) % r.length];
    anim = ['fade','slide','wipe'][Math.floor(Date.now() / scrDur) % 3];
    goTo(next);
    startRot();
  }, scrDur);
}

// ─── page dots ───────────────────────────────────────────────────
function dots() {
  const r = state ? getRotation(state) : [3];
  document.getElementById('pdots').innerHTML =
    r.map(i => `<div class="pdot${i===cur?' active':''}"></div>`).join('');
}

// ─── item helpers ─────────────────────────────────────────────────
function getItems(s, t) {
  const all = [
    ...(s.downloading||[]).map(d => ({ title:d.title, year:'', posterUrl:d.posterUrl||null, status:'downloading', label:`${d.pct}%↓`, rating:null, type:'movie' })),
    ...(s.available||[]).map(m   => ({ title:m.title, year:m.year, posterUrl:m.posterUrl, status:'available', label:'Available', rating:m.rating||null, type:m.type||'movie' })),
    ...(s.requested||[]).map(r   => ({ title:r.title, year:r.year, posterUrl:r.posterUrl, status:'requested', label:'Requested', rating:null, type:r.type||'movie' })),
  ];
  if (t==='movies') return all.filter(i => i.type !== 'series');
  if (t==='tv')     return all.filter(i => i.type === 'series');
  return all;
}

function svcLabel(s) {
  const v = [];
  if (s.services?.radarr) v.push('Radarr');
  if (s.services?.sonarr) v.push('Sonarr');
  if (s.services?.seer)   v.push('Seer');
  return v.length ? `Your library · ${v.join(' · ')}` : 'Your library';
}

// ─── render: now playing (left panel) ────────────────────────────
function renderNP(np) {
  LOG.info('Rendering Now Playing:', np.title);

  if (np.posterUrl) document.getElementById('npPoster').src = np.posterUrl;

  document.getElementById('npTitle').textContent = np.title || '—';
  const meta = [np.year, np.officialRating, np.genres].filter(Boolean).join(' · ');
  document.getElementById('npMeta').textContent = meta;

  // quality badge
  const qb = document.getElementById('npQb');
  if (np.fileDetails) {
    const p = [np.fileDetails.resolution, np.fileDetails.hdr, np.fileDetails.audioCodec].filter(Boolean);
    if (p.length) { qb.textContent = p.join(' · '); qb.style.display = ''; }
    else qb.style.display = 'none';
  } else qb.style.display = 'none';

  // ratings
  const re = document.getElementById('npRats');
  re.innerHTML = '';
  const sc = np.communityRating || np.meta?.voteAverage;
  if (sc) re.innerHTML = `<div class="rpill"><span style="color:#f5c518">★</span><span>${parseFloat(sc).toFixed(1)}</span><span class="rl">Rating</span></div>`;

  // progress
  lPos = np.positionMs || 0;
  lDur = np.durationMs || 0;
  const pct = lDur > 0 ? (lPos / lDur) * 100 : 0;
  document.getElementById('npProg').style.width     = pct + '%';
  document.getElementById('npElapsed').textContent  = fms(lPos);
  document.getElementById('npDur').textContent      = fms(lDur);

  // watcher
  document.getElementById('npUser').textContent = np.userName   || '—';
  document.getElementById('npDev').textContent  = np.deviceName || '—';
  document.getElementById('npAv').textContent   = (np.userName || '?')[0].toUpperCase();

  // file chips
  const fe = document.getElementById('npFile');
  if (np.fileDetails) {
    const fd = np.fileDetails;
    const chips = [
      fd.resolution ? `<div class="fchip"><span class="fl">Resolution</span><span class="fv">${fd.resolution}</span></div>` : '',
      fd.videoCodec ? `<div class="fchip"><span class="fl">Video</span><span class="fv">${fd.videoCodec}${fd.hdr?' / '+fd.hdr:''}</span></div>` : '',
      fd.audioCodec ? `<div class="fchip"><span class="fl">Audio</span><span class="fv">${fd.audioCodec}</span></div>` : '',
      fd.size       ? `<div class="fchip"><span class="fl">File Size</span><span class="fv">${fd.size}</span></div>` : '',
    ].filter(Boolean).join('');
    if (chips) { fe.innerHTML = chips; fe.style.display = ''; }
    else fe.style.display = 'none';
  } else fe.style.display = 'none';

  // overview
  document.getElementById('npOv').textContent = np.overview || '';

  // cast
  const cw = document.getElementById('npCastWrap');
  const cr = document.getElementById('npCast');
  if (np.meta?.cast?.length) {
    cr.innerHTML = np.meta.cast.map(c => `
      <div class="cast-card">
        <img src="${c.profileUrl||''}" alt="${c.name}" onerror="this.style.display='none'">
        <div class="cn">${c.name.split(' ')[0]}<br>${c.name.split(' ').slice(1).join(' ')}</div>
      </div>`).join('');
    cw.style.display = '';
  } else cw.style.display = 'none';
}

// ─── render: up next (right panel) ───────────────────────────────
function renderUpNext(s) {
  const it = getItems(s, tab);
  document.getElementById('npGrid').innerHTML = it.slice(0,20).map(i => `
    <div class="mc">
      <div class="cpw">
        <img class="cp" src="${i.posterUrl||''}" alt="${i.title}" onerror="this.style.opacity=0.15">
        <div class="cs ${CLS[i.status]}">${i.label}</div>
        ${i.rating ? `<div class="cr">★${parseFloat(i.rating).toFixed(1)}</div>` : ''}
      </div>
      <div class="ct">${i.title}</div>
      <div class="cm">${i.year||''}</div>
    </div>`).join('');
  document.getElementById('npSub').textContent = svcLabel(s);
}

// ─── render: upcoming (full grid) ────────────────────────────────
function renderUpcoming(s) {
  const it = getItems(s, 'all');
  LOG.info('Rendering Upcoming:', it.length, 'items');
  document.getElementById('upGrid').innerHTML = it.slice(0,12).map(i => `
    <div class="big-card">
      <div class="bpw">
        <img class="bp" src="${i.posterUrl||''}" alt="${i.title}" onerror="this.style.opacity=0.15">
        <div class="bb ${CLS[i.status]}">${i.label}</div>
        ${i.rating ? `<div class="br">★${parseFloat(i.rating).toFixed(1)}</div>` : ''}
      </div>
      <div class="bt">${i.title}</div>
      <div class="bm">${i.year||''}</div>
    </div>`).join('');
  document.getElementById('upSub').textContent = svcLabel(s);
}

// ─── render: spotlight ───────────────────────────────────────────
function renderSpotlight(s) {
  const sp = s.spotlight;
  if (!sp) { LOG.debug('Spotlight: no item'); return; }
  LOG.info('Rendering Spotlight:', sp.title);

  document.getElementById('spTitle').textContent = sp.title || '—';
  document.getElementById('spMeta').textContent  = [sp.year, sp.source==='sonarr' ? 'TV Series' : 'Movie'].filter(Boolean).join(' · ');
  document.getElementById('spEye').textContent   = sp.status==='downloading' ? 'Arriving Soon' : sp.status==='requested' ? 'Requested' : 'From Your Library';

  const st = document.getElementById('spStatus');
  if (sp.status==='downloading' && sp.pct!=null) {
    st.innerHTML = `↓ Downloading — ${sp.pct}% complete`; st.style.display = '';
  } else if (sp.status==='available') {
    st.innerHTML = '✓ In your library'; st.style.display = '';
  } else st.style.display = 'none';

  document.getElementById('spOv').textContent = sp.overview || '';

  if (sp.posterUrl) {
    document.getElementById('spPoster').src = sp.posterUrl;
    document.getElementById('spBg').style.backgroundImage = `url('${sp.posterUrl}')`;
  }

  const re = document.getElementById('spRats');
  re.innerHTML = '';
  if (sp.rating) re.innerHTML = `<div class="sp-rpill"><span style="color:#f5c518">★</span><span>${parseFloat(sp.rating).toFixed(1)}</span><span class="srl">Rating</span></div>`;

  const ce = document.getElementById('spCast');
  if (sp.cast?.length) {
    ce.innerHTML = `<span class="sp-cast-label">Cast</span>` +
      sp.cast.map(c => `<img src="${c.profileUrl||''}" alt="${c.name}" title="${c.name}" onerror="this.style.display='none'">`).join('');
    ce.style.display = '';
  } else ce.style.display = 'none';
}

// ─── render: idle ────────────────────────────────────────────────
function renderIdle(s) {
  const urls = [
    ...(s.available||[]), ...(s.requested||[]), ...(s.downloading||[])
  ].map(i => i.posterUrl).filter(Boolean).slice(0, 7);
  document.getElementById('idlePosts').innerHTML = urls.map(u => `<img src="${u}" alt="">`).join('');
}

// ─── progress tick ────────────────────────────────────────────────
function startProg() {
  clearInterval(progTmr);
  progTmr = setInterval(() => {
    if (!state?.nowPlaying || state.nowPlaying.isPaused) return;
    lPos = Math.min(lPos + 1000, lDur);
    const pct = lDur > 0 ? (lPos / lDur) * 100 : 0;
    document.getElementById('npProg').style.width    = pct + '%';
    document.getElementById('npElapsed').textContent = fms(lPos);
  }, 1000);
}

// ─── tab switching ────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    tab = b.dataset.tab;
    if (state) renderUpNext(state);
  });
});

// ─── poll ────────────────────────────────────────────────────────
async function pollApi() {
  try {
    LOG.debug('Polling /api/state');
    const res = await fetch('/api/state');
    if (!res.ok) { LOG.warn('Poll failed:', res.status, res.statusText); return; }
    const ns = await res.json();

    LOG.info('State received', {
      nowPlaying:  ns.nowPlaying ? `"${ns.nowPlaying.title}"` : null,
      available:   ns.available?.length,
      downloading: ns.downloading?.length,
      requested:   ns.requested?.length,
    });

    const wasPlaying = !!state?.nowPlaying;
    const isPlaying  = !!ns.nowPlaying;
    state = ns;

    scrDur = (state.config?.screenDuration || 15) * 1000;
    pollMs = (state.config?.pollInterval   || 5)  * 1000;

    // Render all screens with fresh data every poll
    if (isPlaying) renderNP(state.nowPlaying);
    renderUpNext(state);
    renderUpcoming(state);
    renderSpotlight(state);
    renderIdle(state);
    dots();

    if (isPlaying) {
      startProg();
      if (!locked) {
        LOG.info('Playback started — locking to Now Playing');
        locked = true; clearTimeout(sTmr); goTo(0);
      }
    } else {
      clearInterval(progTmr);
      if (locked) {
        LOG.info('Playback stopped — unlocking, starting rotation');
        locked = false;
        const r = getRotation(state);
        goTo(r[0]); startRot();
      } else if (!sTmr) {
        LOG.info('Boot — starting rotation');
        const r = getRotation(state);
        goTo(r[0], true); startRot();
      }
    }
  } catch (e) {
    LOG.error('Poll error:', e.message, e);
  } finally {
    clearTimeout(pTmr);
    pTmr = setTimeout(pollApi, pollMs);
  }
}

// ─── boot ─────────────────────────────────────────────────────────
dots();
pollApi();
</script>
