version: '3.8'

services:
  postarr:
    image: ghcr.io/nerdscorp/postarr-for-jellyfin:latest
    container_name: postarr
    ports:
      - "3000:3000"
    environment:
      - JELLYFIN_URL=${JELLYFIN_URL}
      - JELLYFIN_API_KEY=${JELLYFIN_API_KEY}
      - RADARR_URL=${RADARR_URL:-}
      - RADARR_API_KEY=${RADARR_API_KEY:-}
      - SONARR_URL=${SONARR_URL:-}
      - SONARR_API_KEY=${SONARR_API_KEY:-}
      - SEER_URL=${SEER_URL:-}
      - SEER_API_KEY=${SEER_API_KEY:-}
      - POLL_INTERVAL=${POLL_INTERVAL:-5}
      - SCREEN_DURATION=${SCREEN_DURATION:-15}
      - SCREEN_ROTATION=${SCREEN_ROTATION:-true}
      - SCREEN_TRANSITION=${SCREEN_TRANSITION:-cycle}
      - IDLE_SCREENS=${IDLE_SCREENS:-upcoming,spotlight,idle}
      - CLOCK_TIMEZONE=${CLOCK_TIMEZONE:-}
      - TZ=${TZ:-}
      - NOW_PLAYING_USER_WHITELIST=${NOW_PLAYING_USER_WHITELIST:-}
      - NOW_PLAYING_USER_BLACKLIST=${NOW_PLAYING_USER_BLACKLIST:-}
      - NOW_PLAYING_DEVICE_WHITELIST=${NOW_PLAYING_DEVICE_WHITELIST:-}
      - NOW_PLAYING_DEVICE_BLACKLIST=${NOW_PLAYING_DEVICE_BLACKLIST:-}
    restart: unless-stopped
